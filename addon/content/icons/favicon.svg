<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="node1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#e9d5ff"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect x="4" y="4" width="88" height="88" rx="20" fill="url(#bg)"/>
  <!-- Neural network nodes and connections -->
  <!-- Layer 1 (left) -->
  <circle cx="26" cy="28" r="4.5" fill="url(#node1)" opacity="0.9"/>
  <circle cx="26" cy="48" r="4.5" fill="url(#node1)" opacity="0.9"/>
  <circle cx="26" cy="68" r="4.5" fill="url(#node1)" opacity="0.9"/>
  <!-- Layer 2 (middle) -->
  <circle cx="48" cy="22" r="5" fill="white" opacity="0.95"/>
  <circle cx="48" cy="40" r="5" fill="white" opacity="0.95"/>
  <circle cx="48" cy="56" r="5" fill="white" opacity="0.95"/>
  <circle cx="48" cy="74" r="5" fill="white" opacity="0.95"/>
  <!-- Layer 3 (right) -->
  <circle cx="70" cy="28" r="4.5" fill="url(#node1)" opacity="0.9"/>
  <circle cx="70" cy="48" r="4.5" fill="url(#node1)" opacity="0.9"/>
  <circle cx="70" cy="68" r="4.5" fill="url(#node1)" opacity="0.9"/>
  <!-- Connection lines L1->L2 -->
  <line x1="30.5" y1="28" x2="43" y2="22" stroke="white" stroke-width="1.2" opacity="0.35"/>
  <line x1="30.5" y1="28" x2="43" y2="40" stroke="white" stroke-width="1.2" opacity="0.35"/>
  <line x1="30.5" y1="28" x2="43" y2="56" stroke="white" stroke-width="1.2" opacity="0.35"/>
  <line x1="30.5" y1="48" x2="43" y2="22" stroke="white" stroke-width="1.2" opacity="0.35"/>
  <line x1="30.5" y1="48" x2="43" y2="40" stroke="white" stroke-width="1.2" opacity="0.35"/>
  <line x1="30.5" y1="48" x2="43" y2="56" stroke="white" stroke-width="1.2" opacity="0.35"/>
  <line x1="30.5" y1="48" x2="43" y2="74" stroke="white" stroke-width="1.2" opacity="0.35"/>
  <line x1="30.5" y1="68" x2="43" y2="40" stroke="white" stroke-width="1.2" opacity="0.35"/>
  <line x1="30.5" y1="68" x2="43" y2="56" stroke="white" stroke-width="1.2" opacity="0.35"/>
  <line x1="30.5" y1="68" x2="43" y2="74" stroke="white" stroke-width="1.2" opacity="0.35"/>
  <!-- Connection lines L2->L3 -->
  <line x1="53" y1="22" x2="65.5" y2="28" stroke="white" stroke-width="1.2" opacity="0.35"/>
  <line x1="53" y1="22" x2="65.5" y2="48" stroke="white" stroke-width="1.2" opacity="0.35"/>
  <line x1="53" y1="40" x2="65.5" y2="28" stroke="white" stroke-width="1.2" opacity="0.35"/>
  <line x1="53" y1="40" x2="65.5" y2="48" stroke="white" stroke-width="1.2" opacity="0.35"/>
  <line x1="53" y1="40" x2="65.5" y2="68" stroke="white" stroke-width="1.2" opacity="0.35"/>
  <line x1="53" y1="56" x2="65.5" y2="28" stroke="white" stroke-width="1.2" opacity="0.35"/>
  <line x1="53" y1="56" x2="65.5" y2="48" stroke="white" stroke-width="1.2" opacity="0.35"/>
  <line x1="53" y1="56" x2="65.5" y2="68" stroke="white" stroke-width="1.2" opacity="0.35"/>
  <line x1="53" y1="74" x2="65.5" y2="48" stroke="white" stroke-width="1.2" opacity="0.35"/>
  <line x1="53" y1="74" x2="65.5" y2="68" stroke="white" stroke-width="1.2" opacity="0.35"/>
  <!-- Sparkle dots -->
  <circle cx="78" cy="16" r="2" fill="white" opacity="0.7"/>
  <circle cx="16" cy="78" r="2" fill="white" opacity="0.7"/>
  <circle cx="82" cy="62" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="58" cy="12" r="1.5" fill="white" opacity="0.5"/>
</svg>
